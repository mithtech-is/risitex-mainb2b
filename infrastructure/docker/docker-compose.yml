name: risitex

services:
  postgres:
    image: postgres:16-alpine
    container_name: risitex-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    networks:
      - risitex-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    shm_size: 256mb

  redis:
    image: redis:7-alpine
    container_name: risitex-redis
    restart: unless-stopped
    # Eviction policy = noeviction because Medusa's workflow engine stores workflow state
    # in Redis and cannot tolerate silent evictions. Cache + event bus also coexist here in
    # local dev — if memory pressure becomes an issue we'll split into separate Redis instances.
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --maxmemory
      - "512mb"
      - --maxmemory-policy
      - "noeviction"
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    networks:
      - risitex-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

volumes:
  postgres-data:
    name: risitex-postgres-data
  redis-data:
    name: risitex-redis-data

networks:
  risitex-net:
    name: risitex-net
    driver: bridge
