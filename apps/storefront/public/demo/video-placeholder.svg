    <rect x="40" y="60"  width="50" height="30"/>
    <rect x="100" y="60" width="50" height="30"/>
    <rect x="160" y="60" width="50" height="30"/>
    <rect x="220" y="60" width="50" height="30"/>
    <rect x="280" y="60" width="50" height="30"/>
    <rect x="340" y="60" width="50" height="30"/>
    <rect x="400" y="60" width="50" height="30"/>
    <rect x="460" y="60" width="50" height="30"/>
    <rect x="520" y="60" width="50" height="30"/>
  </g>
  <g fill="#FCFCF9" opacity=".18">
    <rect x="40"  y="510" width="50" height="30"/>
    <rect x="100" y="510" width="50" height="30"/>
    <rect x="160" y="510" width="50" height="30"/>
    <rect x="220" y="510" width="50" height="30"/>
    <rect x="280" y="510" width="50" height="30"/>
    <rect x="340" y="510" width="50" height="30"/>
    <rect x="400" y="510" width="50" height="30"/>
    <rect x="460" y="510" width="50" height="30"/>
    <rect x="520" y="510" width="50" height="30"/>
  </g>
  <text x="50" y="450" font-family="ui-monospace, monospace" font-size="14" fill="#FCFCF9" opacity=".7">Factory walkthrough · 1:30</text>
