<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" role="img" aria-label="Folded wholesale garment on neutral background">
  <defs>
    <linearGradient id="gbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F4EFE6"/>
      <stop offset="100%" stop-color="#E0D7C2"/>
    </linearGradient>
    <linearGradient id="garment" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E9DCC4"/>
      <stop offset="100%" stop-color="#C9B98C"/>
    </linearGradient>
  </defs>
  <rect width="600" height="600" fill="url(#gbg)"/>
  <!-- Folded shirt silhouette -->
  <g>
    <rect x="140" y="170" width="320" height="220" rx="6" fill="url(#garment)"/>
    <!-- Vertical fold line -->
    <line x1="300" y1="170" x2="300" y2="390" stroke="#A89167" stroke-width="2" opacity=".5"/>
    <!-- Collar -->
    <polygon points="240,170 360,170 320,210 280,210" fill="#A89167" opacity=".6"/>
    <!-- Buttons -->
    <circle cx="300" cy="230" r="3" fill="#5E4A2C"/>
    <circle cx="300" cy="260" r="3" fill="#5E4A2C"/>
    <circle cx="300" cy="290" r="3" fill="#5E4A2C"/>
    <circle cx="300" cy="320" r="3" fill="#5E4A2C"/>
    <!-- Pocket -->
    <rect x="350" y="240" width="60" height="60" fill="none" stroke="#A89167" stroke-width="1.5" opacity=".7"/>
  </g>
  <!-- Hang tag -->
  <g transform="translate(440,400)">
    <rect width="80" height="44" rx="4" fill="#FCFCF9" stroke="#5E4A2C" stroke-width="1.5"/>
    <circle cx="14" cy="14" r="3" fill="none" stroke="#5E4A2C" stroke-width="1.5"/>
    <text x="22" y="22" font-family="ui-monospace, monospace" font-size="10" fill="#3D3528">RISITEX</text>
    <text x="22" y="36" font-family="ui-monospace, monospace" font-size="9"  fill="#5E4A2C">Wholesale</text>
  </g>
  <text x="40" y="560" font-family="ui-serif, Georgia, serif" font-size="18" fill="#3D3528" opacity=".7">Catalogue · garment front</text>
</svg>
