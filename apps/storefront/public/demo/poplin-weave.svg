<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1400" width="1400" height="1400" role="img" aria-label="Macro view of cotton poplin weave">
  <defs>
    <!-- Fine woven crosshatch: warp (vertical) + weft (horizontal) threads -->
    <pattern id="warp" width="10" height="10" patternUnits="userSpaceOnUse">
      <rect width="10" height="10" fill="#F1ECDF"/>
      <rect x="0" width="5" height="10" fill="#EAE3D2"/>
      <rect x="0" y="0" width="10" height="5" fill="#00000008"/>
    </pattern>
    <pattern id="microtext" width="300" height="40" patternUnits="userSpaceOnUse" patternTransform="rotate(-12)">
      <text x="0" y="20" font-family="monospace" font-size="11" fill="#0F0F0D14" letter-spacing="2">PIX · 60s POPLIN · ERODE · TN ·</text>
    </pattern>
    <linearGradient id="sheen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.35"/>
      <stop offset="0.5" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.06"/>
    </linearGradient>
  </defs>

  <rect width="1400" height="1400" fill="url(#warp)"/>
  <rect width="1400" height="1400" fill="url(#microtext)"/>
  <rect width="1400" height="1400" fill="url(#sheen)"/>

  <!-- Woven brand label, centre — microtext only legible when zoomed -->
  <g transform="translate(490 600)">
    <rect width="420" height="200" rx="6" fill="#F7F4EE" stroke="#2A3F7A" stroke-width="2"/>
    <text x="210" y="62" text-anchor="middle" font-family="Georgia, serif" font-size="40" fill="#2A3F7A" font-style="italic">PIX</text>
    <text x="210" y="98" text-anchor="middle" font-family="monospace" font-size="15" fill="#5C6438" letter-spacing="3">100% COTTON POPLIN</text>
    <text x="210" y="124" text-anchor="middle" font-family="monospace" font-size="12" fill="#3F3F38" letter-spacing="2">60s YARN · 110 GSM</text>
    <text x="210" y="150" text-anchor="middle" font-family="monospace" font-size="10" fill="#888780" letter-spacing="1">WASH COLD · LINE DRY · IRON WARM</text>
    <text x="210" y="172" text-anchor="middle" font-family="monospace" font-size="9" fill="#A0978A" letter-spacing="1">MADE IN ERODE, TAMIL NADU · IND</text>
  </g>

  <text x="40" y="1360" font-family="monospace" font-size="16" fill="#88878099" letter-spacing="2">HOVER TO ZOOM · WEAVE DETAIL</text>
</svg>
